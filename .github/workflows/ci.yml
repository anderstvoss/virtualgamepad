name: CI

# macOS and Windows matrix disabled on private — cross-platform coverage is
# provided by the public repo's full-matrix CI after each sync. Re-enable by
# restoring pull_request and push triggers below.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

# Linux-applicable gates (cargo fmt, clippy, check, test, cargo-deny,
# cargo-audit, gitleaks, custom blockers) run on developer machines via
# pre-commit + pre-push. GHA covers only macOS and Windows compatibility.
jobs:
  rust-test:
    name: Rust build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@350b8170d67565ecb255cb735a9c516a4106d651
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1

      - name: Check build
        run: cargo check --all-targets --all-features

      - name: Test
        run: cargo test --all-features

  policy:
    name: Policy checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      SKIP: cargo-fmt,cargo-check,cargo-clippy,cargo-test

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run policy hooks
        env:
          PRE_COMMIT_HOME: ${{ runner.temp }}/pre-commit-cache
        run: python -m pre_commit run --all-files --show-diff-on-failure --color=always
