name: Provider Tier B

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  contract-surface:
    name: Contract surface
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            uploads.github.com:443
            static.rust-lang.org:443
            static.crates.io:443
            index.crates.io:443
            crates.io:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check phase 8 command surfaces
        run: |
          cargo run -p virtual_gamepad_demo -- phase-gate 8
          cargo run -p gr-cli -- run-uinput-smoke generic-gamepad
          cargo run -p gr-cli -- support-report --profile generic-gamepad --tier compatibility

  privileged-linux:
    name: Privileged Linux provider validation
    # Enable this once a self-hosted Linux runner with /dev/uinput
    # access exists. Until then keep the job explicit but inert so the
    # intended validation shape is visible in-repo.
    if: false
    runs-on: [self-hosted, linux, uinput]
    timeout-minutes: 20
    needs: contract-surface

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Verify uinput device access
        run: test -e /dev/uinput

      - name: Run prep smoke commands
        run: |
          cargo run -p gr-cli -- run-uinput-smoke generic-gamepad
          cargo run -p gr-cli -- support-report --profile generic-gamepad --tier compatibility
