name: Provider Tier B

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  contract-surface:
    name: Contract surface
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            uploads.github.com:443
            static.rust-lang.org:443
            static.crates.io:443
            index.crates.io:443
            crates.io:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@350b8170d67565ecb255cb735a9c516a4106d651
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1

      - name: Check prep command surfaces
        run: |
          cargo run -p gr-cli -- run-uinput-smoke generic-gamepad
          cargo run -p gr-cli -- support-report --profile generic-gamepad --tier compatibility

  privileged-linux:
    name: Privileged Linux provider validation
    if: ${{ !github.event.repository.private }}
    runs-on: [self-hosted, linux, uinput]
    timeout-minutes: 20
    needs: contract-surface

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@350b8170d67565ecb255cb735a9c516a4106d651
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1

      - name: Verify uinput device access
        run: test -e /dev/uinput

      - name: Run prep smoke commands
        run: |
          cargo run -p gr-cli -- run-uinput-smoke generic-gamepad
          cargo run -p gr-cli -- support-report --profile generic-gamepad --tier compatibility
